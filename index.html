<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Adventure - Login & Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- For icons -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cartoon Characters (Positioned via CSS) -->
    <div class="character left-character">
        <!-- Fun Computer Character -->
        <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="40" width="80" height="60" rx="10" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>
            <rect x="30" y="50" width="60" height="40" fill="#000" rx="5"/>
            <text x="60" y="75" text-anchor="middle" fill="#FFF" font-size="10" font-family="Arial">Code!</text>
            <circle cx="60" cy="30" r="15" fill="#FFA500"/>
            <circle cx="50" cy="25" r="3" fill="#000"/>
            <circle cx="70" cy="25" r="3" fill="#000"/>
            <path d="M55 35 Q60 40 65 35" stroke="#000" stroke-width="2" fill="none"/>
        </svg>
    </div>
    <div class="character right-character">
        <!-- Lightbulb with Gears -->
        <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 20 L50 50 L70 50 Z" fill="#FFD700"/>
            <circle cx="60" cy="60" r="20" fill="#FFA500"/>
            <circle cx="50" cy="55" r="5" fill="#FFF"/>
            <circle cx="70" cy="55" r="5" fill="#FFF"/>
            <circle cx="60" cy="65" r="5" fill="#FFF"/>
            <path d="M40 80 L80 80 L75 100 L45 100 Z" fill="#FFD700"/>
            <circle cx="45" cy="90" r="3" fill="#FFA500"/>
            <circle cx="75" cy="90" r="3" fill="#FFA500"/>
        </svg>
    </div>

    <!-- Header Section -->
    <header class="header">
    <div class="header-content">

        <!-- LOGO -->
<img src="logo.jpeg" alt="Code Adventure Logo" class="site-logo">

        <h1>Welcome to Code Adventure! <i class="fas fa-rocket"></i></h1>
        <p>Ready to code? Let’s start coding fun!</p>

    </div>
</header>


    <!-- Main Card -->
    <div class="container">
        <div class="card">
            <!-- Tabs -->
            <div class="tabs">
                <button id="register-tab" class="tab active">Register <i class="fas fa-user-plus"></i></button>
                <button id="login-tab" class="tab">Login <i class="fas fa-sign-in-alt"></i></button>
            </div>

            <!-- Register Form -->
            <form id="register-form" class="form active">
                <h2>Join the Fun! <i class="fas fa-smile"></i></h2>
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                    <span class="error" id="name-error"></span>
                </div>
                <div class="input-group">
                    <label for="age">Age</label>
                    <select id="age" name="age" required>
                        <option value="">Pick Your Age</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                    </select>
                    <span class="error" id="age-error"></span>
                </div>
                <div class="input-group">
                    <label for="Nickname/Username">Nickname/Username</label>
                    <input type="text" id="username" name="username" required>
                    <span class="error" id="username-error"></span>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
<div class="password-wrapper">
    <input type="password" id="password" name="password" required>
    <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
</div>
                    <span class="error" id="password-error"></span>
                </div>
                <div class="input-group">
                    <label>
                        <input type="checkbox" id="parent-checkbox"> I am a Parent / Guardian (optional)
                    </label>
                </div>
                <div id="parent-section" class="hidden">
                    <div class="input-group">
                        <label for="parent-email">Parent Email</label>
                        <input type="email" id="parent-email" name="parent-email">
                        <span class="error" id="parent-email-error"></span>
                    </div>
                    <div class="input-group">
                        <label for="parent-password">Parent Password</label>
<div class="password-wrapper">
    <input type="password" id="parent-password" name="parent-password">
    <i class="fas fa-eye toggle-password" onclick="togglePassword('parent-password', this)"></i>
</div>
                        <span class="error" id="parent-password-error"></span>
                    </div>
                </div>
                <button type="submit" class="btn register-btn">Sign Up <i class="fas fa-arrow-right"></i></button>
            </form>

            <!-- Login Form -->
            <form id="login-form" class="form">
                <h2>Welcome Back! <i class="fas fa-heart"></i></h2>
                <div class="input-group">
                    <label for="login-username">Username or Email</label>
                    <input type="text" id="login-username" name="login-username" required>
                    <span class="error" id="login-error"></span>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
<div class="password-wrapper">
    <input type="password" id="login-password" name="login-password" required>
    <i class="fas fa-eye toggle-password" onclick="togglePassword('login-password', this)"></i>
</div>
                </div>
                <button type="submit" class="btn login-btn">Log In <i class="fas fa-arrow-right"></i></button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
